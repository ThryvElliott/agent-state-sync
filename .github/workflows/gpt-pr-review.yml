name: GPT code review
run-name: GPT code review

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: gpt-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GPT_MODEL: ${{ vars.OPENAI_REVIEW_MODEL }}
      MODEL_LABEL: GPT 5.4
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Validate workflow configuration
        run: |
          if [ -z "${GPT_MODEL}" ]; then
            echo "Missing repository variable: OPENAI_REVIEW_MODEL" >&2
            exit 1
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing repository secret: OPENAI_API_KEY" >&2
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Generate pull request diff
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          git diff --no-ext-diff --unified=3 "origin/${{ github.base_ref }}...HEAD" > pr.diff

      - name: Build GPT review prompt
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { buildPullRequestReviewPrompt } from './dist/review/prReview.js';

          const event = JSON.parse(readFileSync(process.env.GITHUB_EVENT_PATH, 'utf8'));
          const pullRequest = event.pull_request;
          const diff = readFileSync('pr.diff', 'utf8');

          const prompt = buildPullRequestReviewPrompt({
            baseRef: pullRequest.base.ref,
            body: pullRequest.body ?? '',
            diff,
            headRef: pullRequest.head.ref,
            modelLabel: process.env.MODEL_LABEL,
            prNumber: pullRequest.number,
            repository: process.env.GITHUB_REPOSITORY,
            title: pullRequest.title,
          });

          writeFileSync('review-prompt.txt', prompt);
          EOF

      - name: Request GPT review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const prompt = readFileSync('review-prompt.txt', 'utf8');
          const payload = {
            model: process.env.GPT_MODEL,
            temperature: 0,
            messages: [
              {
                role: 'user',
                content: prompt,
              },
            ],
          };

          writeFileSync('openai-request.json', JSON.stringify(payload));
          EOF

          for attempt in 1 2 3; do
            HTTP_STATUS=$(curl --silent --show-error \
              --request POST \
              --url https://api.openai.com/v1/chat/completions \
              --header "Authorization: Bearer ${OPENAI_API_KEY}" \
              --header "content-type: application/json" \
              --data @openai-request.json \
              --output openai-response.json \
              --write-out "%{http_code}")

            if [ "${HTTP_STATUS}" = "200" ]; then
              break
            fi

            if [ "${HTTP_STATUS}" = "429" ] || [ "${HTTP_STATUS}" = "500" ] || [ "${HTTP_STATUS}" = "502" ] || [ "${HTTP_STATUS}" = "503" ] || [ "${HTTP_STATUS}" = "504" ]; then
              if [ "${attempt}" -lt 3 ]; then
                sleep $((attempt * 5))
                continue
              fi
            fi

            echo "OpenAI API request failed with status ${HTTP_STATUS}" >&2
            cat openai-response.json >&2
            exit 1
          done

      - name: Format GPT review comment
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { formatReviewComment } from './dist/review/prReview.js';

          const response = JSON.parse(readFileSync('openai-response.json', 'utf8'));
          const reviewText = response.choices[0]?.message?.content?.trim() ?? 'No review returned.';

          writeFileSync(
            'review-comment.md',
            formatReviewComment(process.env.MODEL_LABEL, reviewText),
          );
          EOF

      - name: Upsert GPT review comment
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_MARKER: '<!-- agent-state-sync:gpt-5.4 -->'
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" > comments.json

          COMMENT_ID=$(node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs';

          const comments = JSON.parse(readFileSync('comments.json', 'utf8'));
          const marker = process.env.MODEL_MARKER;
          const existingComment = comments.find(
            (comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker),
          );

          if (existingComment !== undefined) {
            process.stdout.write(String(existingComment.id));
          }
          EOF
          )

          if [ -n "${COMMENT_ID}" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -f body="$(cat review-comment.md)"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --method POST \
              -f body="$(cat review-comment.md)"
          fi
