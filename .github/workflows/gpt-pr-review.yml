name: GPT code review
run-name: GPT code review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: number

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: gpt-pr-review-${{ inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALLOWED_ACTOR: ${{ vars.AI_REVIEW_ALLOWED_ACTOR }}
      GPT_MODEL: ${{ vars.OPENAI_REVIEW_MODEL }}
      MODEL_LABEL: GPT 5.4
      PR_NUMBER: ${{ inputs.pr_number }}
      REQUESTED_BY: ${{ github.triggering_actor || github.actor }}
    steps:
      - name: Resolve pull request context
        id: pr_context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pull-request.json

          node --input-type=module <<'EOF'
          import { appendFileSync, readFileSync } from 'node:fs';

          const pullRequest = JSON.parse(readFileSync('pull-request.json', 'utf8'));
          const lines = [
            `base_ref=${pullRequest.base.ref}`,
            `head_ref=${pullRequest.head.ref}`,
            `head_sha=${pullRequest.head.sha}`,
            `pr_number=${pullRequest.number}`,
            'body<<AGENT_SYNC_DELIM',
            pullRequest.body ?? '',
            'AGENT_SYNC_DELIM',
            'title<<AGENT_SYNC_DELIM',
            pullRequest.title,
            'AGENT_SYNC_DELIM',
          ];

          appendFileSync(process.env.GITHUB_OUTPUT, `${lines.join('\n')}\n`);
          EOF

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ steps.pr_context.outputs.head_sha }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Validate workflow configuration
        run: |
          if [ -z "${ALLOWED_ACTOR}" ]; then
            echo "Missing repository variable: AI_REVIEW_ALLOWED_ACTOR" >&2
            exit 1
          fi

          if [ -z "${GPT_MODEL}" ]; then
            echo "Missing repository variable: OPENAI_REVIEW_MODEL" >&2
            exit 1
          fi

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Missing repository secret: OPENAI_API_KEY" >&2
            exit 1
          fi

          if [ "${REQUESTED_BY}" != "${ALLOWED_ACTOR}" ]; then
            echo "GPT review dispatch is restricted to ${ALLOWED_ACTOR}; received ${REQUESTED_BY}." >&2
            exit 1
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Generate pull request diff
        run: |
          git fetch origin "${{ steps.pr_context.outputs.base_ref }}" --depth=1
          git diff --no-ext-diff --unified=3 "origin/${{ steps.pr_context.outputs.base_ref }}...HEAD" > pr.diff

      - name: Build GPT review prompt
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { buildPullRequestReviewPrompt } from './dist/review/prReview.js';

          const diff = readFileSync('pr.diff', 'utf8');

          const prompt = buildPullRequestReviewPrompt({
            baseRef: process.env.PR_BASE_REF,
            body: process.env.PR_BODY ?? '',
            diff,
            headRef: process.env.PR_HEAD_REF,
            modelLabel: process.env.MODEL_LABEL,
            prNumber: Number(process.env.PR_NUMBER),
            repository: process.env.GITHUB_REPOSITORY,
            title: process.env.PR_TITLE,
          });

          writeFileSync('review-prompt.txt', prompt);
          EOF
        env:
          PR_BASE_REF: ${{ steps.pr_context.outputs.base_ref }}
          PR_BODY: ${{ steps.pr_context.outputs.body }}
          PR_HEAD_REF: ${{ steps.pr_context.outputs.head_ref }}
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
          PR_TITLE: ${{ steps.pr_context.outputs.title }}

      - name: Request GPT review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const prompt = readFileSync('review-prompt.txt', 'utf8');
          const payload = {
            model: process.env.GPT_MODEL,
            temperature: 0,
            messages: [
              {
                role: 'user',
                content: prompt,
              },
            ],
          };

          writeFileSync('openai-request.json', JSON.stringify(payload));
          EOF

          for attempt in 1 2 3; do
            HTTP_STATUS=$(curl --silent --show-error \
              --request POST \
              --url https://api.openai.com/v1/chat/completions \
              --header "Authorization: Bearer ${OPENAI_API_KEY}" \
              --header "content-type: application/json" \
              --data @openai-request.json \
              --output openai-response.json \
              --write-out "%{http_code}")

            if [ "${HTTP_STATUS}" = "200" ]; then
              break
            fi

            if [ "${HTTP_STATUS}" = "429" ] || [ "${HTTP_STATUS}" = "500" ] || [ "${HTTP_STATUS}" = "502" ] || [ "${HTTP_STATUS}" = "503" ] || [ "${HTTP_STATUS}" = "504" ]; then
              if [ "${attempt}" -lt 3 ]; then
                sleep $((attempt * 5))
                continue
              fi
            fi

            echo "OpenAI API request failed with status ${HTTP_STATUS}" >&2
            cat openai-response.json >&2
            exit 1
          done

      - name: Format GPT review comment
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';
          import { formatReviewComment } from './dist/review/prReview.js';

          const response = JSON.parse(readFileSync('openai-response.json', 'utf8'));
          const reviewText = response.choices[0]?.message?.content?.trim() ?? 'No review returned.';

          writeFileSync(
            'review-comment.md',
            formatReviewComment(process.env.MODEL_LABEL, reviewText),
          );
          EOF

      - name: Upsert GPT review comment
        env:
          GH_TOKEN: ${{ github.token }}
          MODEL_MARKER: '<!-- agent-state-sync:gpt-5.4 -->'
        run: |
          gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" > comments.json

          COMMENT_ID=$(node --input-type=module <<'EOF'
          import { readFileSync } from 'node:fs';

          const comments = JSON.parse(readFileSync('comments.json', 'utf8'));
          const marker = process.env.MODEL_MARKER;
          const existingComment = comments.find(
            (comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker),
          );

          if (existingComment !== undefined) {
            process.stdout.write(String(existingComment.id));
          }
          EOF
          )

          if [ -n "${COMMENT_ID}" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              --method PATCH \
              -f body="$(cat review-comment.md)"
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --method POST \
              -f body="$(cat review-comment.md)"
          fi
